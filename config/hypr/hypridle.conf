general {
    lock_cmd = pidof hyprlock || hyprlock       # Comando para bloquear
    before_sleep_cmd = loginctl lock-session    # Bloquear antes de suspender
    after_sleep_cmd = hyprctl dispatch dpms on  # Encender pantalla al despertar
}

# A los 5 minutos (300s): Bloquear pantalla
listener {
    timeout = 300
    on-timeout = loginctl lock-session
}

# A los 5.5 minutos (330s): Apagar monitor para ahorrar
listener {
    timeout = 330
    on-timeout = hyprctl dispatch dpms off
    on-resume = hyprctl dispatch dpms on
}

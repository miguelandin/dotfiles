# --- MONITORES ---
# 1. Portátil
monitor = eDP-1, 1920x1200@60, 0x0, 1
# 2. MSI Central
monitor = DP-9, 1920x1080@144, 1920x0, 1
# 3. MSI Derecha
monitor = DP-8, 1920x1080@144, 3840x0, 1

# --- VARIABLES DE ENTORNO ---
env = XDG_SESSION_TYPE,wayland
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_DESKTOP,Hyprland
env = WLR_NO_HARDWARE_CURSORS,1

# --- AÑADE ESTO ---
env = XCURSOR_THEME,breeze_cursors
env = XCURSOR_SIZE,32
env = GTK_THEME,Catppuccin-Mocha-Standard-Blue-Dark

# --- TECLADO Y RATÓN ---
input {
    kb_layout = es
    follow_mouse = 1
    touchpad {
        natural_scroll = no
    }
}

# --- ESTÉTICA BÁSICA (Para que no se vea todo pegado) ---
general {
    gaps_in = 5        # Hueco entre ventanas
    gaps_out = 10      # Margen con el borde de la pantalla
    border_size = 2    # Grosor del borde de color
    col.active_border = rgba(d49721ff) rgba(ffcc66ff) 45deg
    col.inactive_border = rgba(595959aa) # Color borde inactivo
    layout = dwindle
}

# --- ATAJOS PRINCIPALES ---
$mainMod = SUPER

bind = $mainMod, RETURN, exec, kitty
bind = $mainMod, M, exit, 
bind = $mainMod, SPACE, exec, rofi -show drun
bind = $mainMod, B, exec, firefox
bind = $mainMod, F, exec, thunar
bind = $mainMod SHIFT, L, exec, hyprlock
bind = $mainMod, P, exec, hyprpicker -a
bind = $mainMod, O, exec, obsidian
bind = $mainMod SHIFT, W, exec, pkill swaybg; swaybg -i $(find /home/mike/Pictures/wallpapers/gruvbox -type f | shuf -n 1) -m fill &

# Gestión de Ventanas
bind = $mainMod, W, killactive,
bind = $mainMod, V, fullscreen,
bind = $mainMod, C, togglefloating,

# --- RECARGA INTELIGENTE (Reinicia waybar también) ---
bind = $mainMod SHIFT, R, exec, killall waybar; waybar & hyprctl reload && notify-send "Hyprland" "Configuración recargada"

# --- MOVIMIENTO (LO QUE FALTABA) ---
# Moverse entre ventanas con flechas
bind = $mainMod, H, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, K, movefocus, u
bind = $mainMod, J, movefocus, d

# Moverse por los espacios de trabajo (1-5)
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8

# Mover la ventana activa a otro espacio de trabajo (con Shift + Número)
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8

# Mover/Redimensionar ventanas con el ratón + tecla Super
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# --- INICIO AUTOMÁTICO ---
exec-once = waybar
exec-once = dunst
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
exec-once = nm-applet
exec-once = swaybg -i $(find /home/mike/Pictures/wallpapers/gruvbox -type f | shuf -n 1) -m fill
exec-once = hypridle
exec-once = ~/.config/hypr/scripts/xdg-portal-hyprland

# Decorado
decoration {
    rounding = 10               # Bordes redondeados (queda mejor con transparencia)

    # Opacidad (0.0 a 1.0)
    active_opacity = 0.95       # Ventana que estás usando (casi sólida para leer bien)
    inactive_opacity = 0.80     # Ventanas de fondo (más transparentes)

    # El efecto de desenfoque (Blur) - Vital para el efecto cristal
    blur {
        enabled = true
        size = 3                # Tamaño del desenfoque
        passes = 2              # Calidad (más pases = mejor calidad pero más GPU)
        vibrancy = 0.1696       # Hace que los colores resalten
    }

    # Sombras para dar profundidad
    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }
}

# Reglas de ventanas
windowrule = opacity 1.0 override 1.0 override, match:class firefox
windowrule = opacity 1.0 override 1.0 override, match:class discord
windowrule = opacity 0.90 override 0.90 override, match:class jetbrains-idea
windowrule = opacity 1.0 override 1.0 override, match:class jetbrains-studio
windowrule = opacity 1.0 override 1.0 override, match:class VirtualBox Machine

# --- TECLAS MULTIMEDIA Y BRILLO ---
# Volumen (Requiere pamixer)
bindel = , XF86AudioRaiseVolume, exec, pamixer -i 5
bindel = , XF86AudioLowerVolume, exec, pamixer -d 5
bindl  = , XF86AudioMute, exec, pamixer -t

# Brillo de pantalla (Requiere brightnessctl)
bindel = , XF86MonBrightnessUp, exec, brightnessctl s 10%+
bindel = , XF86MonBrightnessDown, exec, brightnessctl s 10%-

# Control de Medios (Play/Pause)
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPrev, exec, playerctl previous

# --- CAPTURAS DE PANTALLA ---

# Imprimir pantalla completa -> Copiar al portapapeles y avisar
bind = , Print, exec, grim - | wl-copy && notify-send "Pantalla copiada"

# Shift + Imprimir (Recorte) -> Copiar al portapapeles y avisar
bind = SHIFT, Print, exec, grim -g "$(slurp)" - | wl-copy && notify-send "Recorte copiado"

# Guardar captura
bind = CTRL SHIFT, Print, exec, grim | notify-send "Captura Guardada"

# Activar modo trampas
bind = CTRL SHIFT, Z, exec, ~/.config/waybar/scripts/quizsnap-toggle.sh
